services:
  db:
    image: postgres:16
    container_name: rank_db
    restart: always
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - rank_p_db_data:/var/lib/postgresql/data
      - ./db_init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"

  pgadmin:
    image: dpage/pgadmin4
    container_name: rank_pgadmin
    restart: always
    environment:
      environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "5050:80"
    depends_on:
      - db

  api:
    build: ./api
    container_name: rank_api
    restart: always
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      APP_ENV: production
      APP_URL: http://49.13.163.131:8000
      SANCTUM_STATEFUL_DOMAINS: 49.13.163.131
      SESSION_DOMAIN: 49.13.163.131
      CORS_ALLOWED_ORIGINS: http://49.13.163.131

  frontend:
    build: ./frontend
    container_name: rank_frontend
    restart: always
    # Mapeamos el puerto 80 de tu servidor al 5173 de Vite
    ports:
      - "80:5173"
    depends_on:
      - api
    environment:
      VITE_API_URL: http://49.13.163.131:8000

volumes:
  rank_p_db_data: